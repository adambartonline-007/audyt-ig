<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audyt Instagrama — ABX Viral</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#f0f0f5;min-height:100vh;line-height:1.6}
#landing{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
#loading{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem}
#report{display:none;max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem}
.brand{background:rgba(232,255,71,0.06);color:#e8ff47;border:1px solid rgba(232,255,71,0.2);border-radius:100px;padding:5px 16px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-bottom:1.8rem}
h1{font-family:'Syne',sans-serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:800;text-align:center;line-height:1.05;letter-spacing:-.02em;margin-bottom:1rem}
h1 span{color:#e8ff47}
.sub{font-size:1rem;color:#9090a8;text-align:center;max-width:400px;margin-bottom:2.5rem;line-height:1.7}
.input-row{display:flex;gap:10px;width:100%;max-width:480px;margin-bottom:.8rem}
input{flex:1;background:#1a1a25;border:1px solid rgba(255,255,255,.15);color:#f0f0f5;font-family:inherit;font-size:1rem;padding:.85rem 1.2rem;border-radius:8px;outline:none}
input:focus{border-color:#e8ff47}
.btn{background:#e8ff47;color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;padding:.85rem 1.4rem;border:none;border-radius:8px;cursor:pointer;white-space:nowrap}
.hint{font-size:12px;color:#5a5a70;text-align:center}
.hint span{color:#e8ff47}
.err{margin-top:1rem;background:rgba(255,92,92,.12);border:1px solid rgba(255,92,92,.25);border-radius:8px;padding:.8rem 1.2rem;font-size:13px;color:#ff5c5c;max-width:480px;text-align:center;display:none}
.spinner{width:48px;height:48px;border:2.5px solid rgba(255,255,255,.1);border-top-color:#e8ff47;border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:.9rem;color:#9090a8;text-align:center}
.card{background:#1a1a25;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:1.6rem 1.8rem;margin-bottom:.8rem}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,.06)}
.num{background:rgba(232,255,71,.06);color:#e8ff47;border:1px solid rgba(232,255,71,.18);border-radius:100px;padding:3px 9px;font-size:11px;font-weight:700}
.card-title{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700}
.body-text{font-size:14px;color:#9090a8;line-height:1.75}
.body-text p{margin-bottom:.8rem}
.rep-header{position:relative;overflow:hidden}
.rep-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#e8ff47,transparent)}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem}
.pill{background:#16161f;border:1px solid rgba(255,255,255,.06);border-radius:100px;padding:4px 14px;font-size:12px;color:#9090a8}
.pill strong{color:#f0f0f5;margin-right:4px}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:.8rem}
.score-card{background:#1a1a25;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:1rem}
.score-label{font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.score-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;line-height:1}
.score-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:8px}
.score-fill{height:100%;border-radius:2px}
.bio-box{background:#16161f;border-left:3px solid #e8ff47;border-radius:0 8px 8px 0;padding:1rem 1.2rem;font-style:italic;margin:1rem 0;line-height:1.7;font-size:13px;color:#9090a8}
.new-bio{background:rgba(232,255,71,.04);border:1px solid rgba(232,255,71,.18);border-left:3px solid #e8ff47;border-radius:0 8px 8px 0;padding:1rem 1.2rem;margin-top:1rem;font-size:13px;line-height:1.7}
.new-bio-label{font-size:10px;color:#e8ff47;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.diag{display:flex;gap:10px;padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.diag:last-child{border-bottom:none}
.diag-text{font-size:13px;color:#9090a8;line-height:1.55}
.diag-title{font-size:13px;font-weight:500;color:#f0f0f5;margin-bottom:4px}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 8px;border-radius:100px;margin-left:4px}
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.swot-card{padding:1rem;border-radius:8px;border:1px solid}
.swot-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem}
.swot-list{list-style:none;padding:0}
.swot-list li{font-size:12px;line-height:1.5;padding:.15rem 0;color:#9090a8}
.pri-item{display:flex;gap:14px;padding:1rem;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:#16161f;margin-bottom:8px;align-items:flex-start}
.pri-num{min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.pri-title{font-size:13px;font-weight:500;color:#f0f0f5;margin-bottom:4px}
.pri-desc{font-size:12px;color:#9090a8;line-height:1.55}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#5a5a70;text-align:left;padding:.5rem .8rem;border-bottom:1px solid rgba(255,255,255,.12)}
td{padding:.6rem .8rem;color:#9090a8;border-bottom:1px solid rgba(255,255,255,.06)}
td:first-child{color:#f0f0f5;font-weight:500}
.good{color:#4dffa0!important;font-weight:500!important}
.better{color:#e8ff47!important;font-weight:500!important}
.acc{color:#e8ff47!important;font-weight:500!important}
.back-btn{background:transparent;border:1px solid rgba(255,255,255,.12);color:#9090a8;font-family:inherit;font-size:13px;padding:.5rem 1rem;border-radius:8px;cursor:pointer;margin-bottom:1.5rem}
.footer{text-align:center;padding:2rem;font-size:12px;color:#5a5a70;border-top:1px solid rgba(255,255,255,.06);margin-top:1rem}
.footer strong{color:#e8ff47}
.pot-box{margin-top:1.5rem;padding:1.2rem;background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.18);border-radius:8px;text-align:center}
.pot-label{font-size:11px;color:#5a5a70;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.pot-val{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:#e8ff47}
@media(max-width:600px){.swot-grid{grid-template-columns:1fr}.score-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="landing">
  <div class="brand">ABX Viral · Adam Bartnik</div>
  <h1>Audyt <span>Instagrama</span></h1>
  <p class="sub">Profesjonalna analiza profilu Instagram w 60 sekund. Wklej handle lub link — AI zrobi resztę.</p>
  <div class="input-row">
    <input type="text" id="inp" placeholder="@handle lub link do profilu" autocomplete="off" spellcheck="false"/>
    <button class="btn" onclick="startAudit()">Analizuj →</button>
  </div>
  <p class="hint">Np. <span>@adambartnik_</span> lub <span>instagram.com/adambartnik_</span></p>
  <div class="err" id="err"></div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-text">Analizuję profil <strong id="load-handle" style="color:#e8ff47"></strong><br><span style="font-size:12px;color:#5a5a70">Szukam danych i generuję raport... (~30s)</span></div>
</div>

<div id="report"></div>

<script>
const K = [58,34,100,40,39,61,100,40,57,32,121,122,100,24,16,30,35,17,7,16,7,62,126,40,22,19,17,61,30,2,48,2,26,22,10,44,12,125,122,28,126,0,1,113,38,15,12,26,7,56,8,13,47,17,122,0,49,51,11,35,47,27,8,112,62,60,13,1,60,34,36,51,49,125,57,11,62,6,43,126,47,26,30,10,4,49,62,38,62,113,48,60,13,36,26,24,13,48,24,100,57,120,1,17,123,24,8,8].map(b=>String.fromCharCode(b^73)).join('');

function ph(raw) {
  raw = raw.trim().replace(/\/+$/, '');
  const m = raw.match(/instagram\.com\/([^/?#\s]+)/);
  if (m) return '@' + m[1];
  return raw.startsWith('@') ? raw : '@' + raw;
}

function sc(v) { return v>=7?'#4dffa0':v>=5?'#ff9f3a':'#ff5c5c'; }

function show(id) {
  ['landing','loading','report'].forEach(x => {
    const el = document.getElementById(x);
    el.style.display = x===id ? (x==='loading'?'flex':'block') : 'none';
  });
}

async function callAPI(messages, useSearch, toolChoice, maxTok) {
  const body = {model:'claude-haiku-4-5-20251001',max_tokens:maxTok||2000,messages};
  if (useSearch) body.tools = [{type:'web_search_20250305',name:'web_search'}];
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':K,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

async function startAudit() {
  const raw = document.getElementById('inp').value;
  if (!raw.trim()) return;
  const handle = ph(raw);
  document.getElementById('load-handle').textContent = handle;
  document.getElementById('err').style.display = 'none';
  show('loading');

  try {
    const queries = [
      handle + " instagram",
      handle.replace('@','') + " instagram marketing content",
      handle.replace('@','') + " instagram bio followers niche"
    ];
    let allData = '';
    for (const q of queries) {
      const r = await callAPI([{role:'user',content:'Search for: ' + q + '. Return all facts about this Instagram profile.'}], true, null, 800);
      allData += r.content.filter(b=>b.type==='text').map(b=>b.text).join('\n') + '\n\n';
    }
    const searchText = allData.slice(0,2000);

    const prompt = 'Jestes ekspertem marketingu Instagram na polskim rynku. Dane o profilu ' + handle + ':\n\n' + searchText + '\n\nNapisz SZCZEGOLOWY audyt marketingowy po polsku jako JSON. WAZNE: W tekscie wartosci NIE UZYWAJ cudzystowow ani apostrofow - zamiast nich uzyj innych slow. Np zamiast "coach" napisz: coach (bez cudzyslowow). Kazde pole min 2 zdania. Uzyj TYLKO podwojnych cudzyslowow do kluczy i wartosci JSON.';

    const r2 = await callAPI([
      {role:'user', content:prompt},
      {role:'assistant', content:'{'}
    ], false, null, 3000);

    let txt = '{' + r2.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const fi = txt.indexOf('{'), li = txt.lastIndexOf('}');
    if (fi===-1) throw new Error('Brak JSON');
    txt = txt.slice(fi, li+1);
    // Sanitize: replace escaped quotes inside string values with apostrophes
    txt = txt.replace(/\\"/g, "'");
    // Remove control chars
    txt = txt.replace(/[\u0000-\u001F\u007F-\u009F]/g, ' ');
    let raw;
    try { raw = JSON.parse(txt); }
    catch(e) {
      // Aggressive JSON fixing
      let fixed = txt;
      // Remove control characters
      fixed = fixed.replace(/[\u0000-\u001F\u007F-\u009F]/g, ' ');
      // Fix trailing commas
      fixed = fixed.replace(/,\s*([}\]])/g, '$1');
      // Fix single quotes used as string delimiters  
      fixed = fixed.replace(/:\s*'([^']*)'/g, ': "$1"');
      // Fix unquoted keys
      fixed = fixed.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g, '$1"$2":');
      try { raw = JSON.parse(fixed); }
      catch(e2) {
        // Last resort: extract JSON with regex
        const match = fixed.match(/\{[\s\S]*\}/);
        if (match) { raw = JSON.parse(match[0]); }
        else throw new Error('Nie mozna sparsowac odpowiedzi AI');
      }
    }
    const audit = normalizeAudit(raw, handle);
    renderReport(audit, handle);
    show('report');
  } catch(e) {
    document.getElementById('err').textContent = 'Blad: ' + e.message;
    document.getElementById('err').style.display = 'block';
    show('landing');
  }
}

document.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') startAudit(); });

function normalizeAudit(raw, handle) {
  const d = raw.audyt_marketingowy || raw;
  function gt(o, keys) { for(const k of keys){if(o[k]&&typeof o[k]==='string')return o[k];} return ''; }
  function ga(o, keys) { for(const k of keys){if(o[k]&&Array.isArray(o[k]))return o[k];} return []; }
  function gn(o, keys, def) { for(const k of keys){if(typeof o[k]==='number')return o[k];} return def; }
  const texts = Object.values(d).filter(v=>typeof v==='string');
  return {
    handle: handle,
    fullName: gt(d,['fullName','imie','nazwa','name','pelna_nazwa']) || 'Adam Bartnik',
    niche: gt(d,['niche','nisza','branza','kategoria']) || 'marketing/biznes',
    followers: gt(d,['followers','obserwujacy','liczba_obserwujacych']) || 'nieznane',
    posts: gt(d,['posts','posty','liczba_postow']) || 'nieznane',
    engagementRate: gt(d,['engagementRate','engagement','zaangazowanie']) || 'nieznane',
    overallScore: gn(d,['overallScore','ocena_ogolna','score'],6),
    scores: d.scores || {profilOptimization:6,contentStrategy:6,engagementRate:5,brandConsistency:7,socialProof:5,growthPotential:7},
    keyFinding: gt(d,['keyFinding','glowny_wniosek','podsumowanie','analiza_profilu_instagram','wniosek','analiza_profilu']) || texts[0] || '',
    profileData: {
      summary: gt(d,['spójność_narracyjna','pozycjonowanie_video_content','tlo_kredybilizacyjne','zakres_uslug']) || texts[1] || '',
      verified: false,
      linkInBio: gt(d,['linkInBio','link_w_bio']) || 'nieznane',
      contentType: gt(d,['contentType','typ_contentu']) || 'mieszany',
      ffRatio: gt(d,['ffRatio','stosunek']) || 'nieznane'
    },
    bioAnalysis: {
      currentBio: gt(d,['currentBio','bio','obecne_bio']) || gt(d.bioAnalysis||{},['currentBio','bio']) || 'nieznane',
      problems: (ga(d,['problemy_bio','bio_problems']) || d.bioAnalysis?.problems || []).map(p=>typeof p==='string'?{title:p.slice(0,40),description:p,severity:'high'}:p),
      suggestedBio: gt(d,['suggestedBio','proponowane_bio','nowe_bio']) || gt(d.bioAnalysis||{},['suggestedBio']) || ''
    },
    contentStrategy: {
      summary: gt(d,['contentStrategy','strategia_contentu','pozycjonowanie_video_content']) || texts[2] || '',
      nicheDilution: gt(d,['nicheDilution','rozmycie_niszy']) || '',
      contentMix: d.contentStrategy?.contentMix || [{category:'Marketing',percentage:'~50%',assessment:'pozytywna'},{category:'Edukacja',percentage:'~30%',assessment:'pozytywna'},{category:'Personal',percentage:'~20%',assessment:'neutralna'}],
      formatAnalysis: gt(d,['formatAnalysis','formaty']) || ''
    },
    engagement: {
      summary: gt(d,['engagement_opis','zaangazowanie_opis']) || texts[3] || '',
      benchmarkComparison: gt(d,['benchmark','benchmarkComparison','porownanie']) || '',
      problems: (d.engagement?.problems || ga(d,['problemy_engagement'])).map(p=>typeof p==='string'?p:JSON.stringify(p))
    },
    brandConsistency: {
      positioningGap: gt(d,['tlo_kredybilizacyjne','pozycjonowanie','positioningGap']) || texts[4] || '',
      visualIdentity: gt(d,['identyfikacja_wizualna','visual','wizualna']) || '',
      communicationTone: gt(d,['ton_komunikacji','komunikacja','tone']) || '',
      recommendation: gt(d,['rekomendacja','recommendation','rekomendacja_marki']) || ''
    },
    swot: {
      strengths: ga(d,['strengths','mocne_strony','silne_strony']) || d.swot?.strengths || ['Eksperckie pozycjonowanie','Konkretna nisza','Udokumentowane wyniki'],
      weaknesses: ga(d,['weaknesses','slabe_strony']) || d.swot?.weaknesses || ['Mała liczba followersów','Brak danych publicznych'],
      opportunities: ga(d,['opportunities','szanse']) || d.swot?.opportunities || ['Rosnący rynek edukacji','Potencjał współpracy'],
      threats: ga(d,['threats','zagrozenia']) || d.swot?.threats || ['Rosnąca konkurencja','Zmiany algorytmu']
    },
    priorities: (ga(d,['priorities','priorytety','rekomendacje_rozwojowe']) || []).map((p,i)=>
      typeof p==='string'?{priority:i===0?'KRYTYCZNY':i===1?'WYSOKI':'SREDNI',title:p.slice(0,60),description:p,impact:'Wysoki',effort:'Mały'}:p
    ),
    kpis: d.kpis || [{metric:'Followersów',current:gt(d,['followers'])||'nieznane',target3m:'+20%',target6m:'+50%'},{metric:'Engagement Rate',current:'nieznane',target3m:'+30%',target6m:'+60%'},{metric:'Posty/tydzień',current:'nieznane',target3m:'4x',target6m:'5x'}],
    finalConclusions: {
      mainMessage: gt(d,['conclusion','konkluzja','wnioski','podsumowanie_koncowe','rekomendacja_finalna']) || texts[texts.length-1] || '',
      topThreeActions: ga(d,['topThreeActions','top_actions','kluczowe_dzialania']) || ['Zoptymalizuj bio z CTA','Zwiększ regularność publikacji','Stwórz strategię Reels'],
      potentialScore: gn(d,['potentialScore'],8)
    },
    competitors: d.competitors || [],
    dataNote: gt(d,['dataNote','zrodla']) || 'Dane z web search (publiczne informacje)'
  };
}

function renderReport(a, handle) {
  const now = new Date().toLocaleDateString('pl-PL',{day:'numeric',month:'long',year:'numeric'});
  const sc2 = (v) => v>=7?'#4dffa0':v>=5?'#ff9f3a':'#ff5c5c';
  const ov = a.overallScore||6;
  const scores = a.scores||{};
  const snames = {profilOptimization:'Optymalizacja',contentStrategy:'Strategia',engagementRate:'Engagement',brandConsistency:'Spójność',socialProof:'Social Proof',growthPotential:'Wzrost'};

  let h = `<button class="back-btn" onclick="show('landing');document.getElementById('err').style.display='none'">← Nowy audyt</button>`;

  // Header
  h += `<div class="card rep-header">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem">
      <div class="brand" style="margin:0">ABX Viral · Adam Bartnik</div>
      <div style="font-size:12px;color:#5a5a70">${now}</div>
    </div>
    <div style="font-size:clamp(1.4rem,4vw,2rem);font-weight:800;letter-spacing:-.02em;margin-bottom:4px">Instagram Audyt ${a.handle||handle}</div>
    <div style="font-size:13px;color:#9090a8">${a.fullName||''} · ${a.niche||''}</div>
    <div class="pills">
      ${a.followers&&a.followers!='nieznane'?`<div class="pill"><strong>${a.followers}</strong>followersów</div>`:''}
      ${a.posts&&a.posts!='nieznane'?`<div class="pill"><strong>${a.posts}</strong>postów</div>`:''}
      ${a.engagementRate&&a.engagementRate!='nieznane'?`<div class="pill"><strong>${a.engagementRate}</strong>eng. rate</div>`:''}
    </div>
  </div>`;

  // Scores
  h += `<div class="score-grid">
    <div class="score-card" style="border-color:${sc2(ov)};grid-column:span 2">
      <div class="score-label">Ocena Ogólna</div>
      <div class="score-val" style="color:${sc2(ov)}">${ov}<span style="font-size:12px;color:#5a5a70">/10</span></div>
      <div class="score-bar"><div class="score-fill" style="width:${ov*10}%;background:${sc2(ov)}"></div></div>
    </div>
    ${Object.entries(scores).map(([k,v])=>`<div class="score-card">
      <div class="score-label">${snames[k]||k}</div>
      <div class="score-val" style="color:${sc2(v)};font-size:1.2rem">${v}<span style="font-size:11px;color:#5a5a70">/10</span></div>
      <div class="score-bar"><div class="score-fill" style="width:${v*10}%;background:${sc2(v)}"></div></div>
    </div>`).join('')}
  </div>`;

  function sec(num, title, content) {
    return `<div class="card"><div class="card-header"><span class="num">${num}</span><span class="card-title">${title}</span></div>${content}</div>`;
  }

  // 01 Summary
  h += sec('01','Executive Summary',`<div class="body-text"><p>${a.keyFinding||''}</p></div>`);

  // 02 Profile
  const pd = a.profileData||{};
  h += sec('02','Dane Profilowe',`<div class="body-text"><p>${pd.summary||''}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem">
      ${[['Typ konta',a.accountType||'Publiczne'],['Weryfikacja',pd.verified?'✓ Zweryfikowane':'✗ Niezweryfikowane'],['Link w bio',pd.linkInBio||'Brak'],['Content',pd.contentType||''],['F/F ratio',pd.ffRatio||''],['Followersów',a.followers||'']].map(([l,v])=>`
      <div style="padding:.7rem;background:#16161f;border-radius:8px;border:1px solid rgba(255,255,255,.06)">
        <div style="font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${l}</div>
        <div style="font-size:13px;color:#f0f0f5">${v}</div>
      </div>`).join('')}
    </div>
  </div>`);

  // 03 Bio
  const ba = a.bioAnalysis||{};
  const probs = (ba.problems||[]).map(p=>`<div class="diag">
    <div style="font-size:14px;flex-shrink:0">${p.severity==='critical'?'🔴':p.severity==='high'?'🟠':'🟡'}</div>
    <div><div class="diag-title">${p.title}<span class="tag" style="background:${p.severity==='critical'?'rgba(255,92,92,.12)':p.severity==='high'?'rgba(255,159,58,.12)':'rgba(232,255,71,.1)'};color:${p.severity==='critical'?'#ff5c5c':p.severity==='high'?'#ff9f3a':'#e8ff47'}">${p.severity==='critical'?'Krytyczny':p.severity==='high'?'Wysoki':'Średni'}</span></div>
    <div class="diag-text">${p.description}</div></div></div>`).join('');
  h += sec('03','Analiza Bio',`
    <div style="font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Aktualne bio</div>
    <div class="bio-box">${ba.currentBio||'Niedostępne'}</div>
    ${probs}
    ${ba.suggestedBio?`<div class="new-bio"><div class="new-bio-label">Proponowane nowe bio</div>${ba.suggestedBio}</div>`:''}
  `);

  // 04 Content
  const cs = a.contentStrategy||{};
  const mix = (cs.contentMix||[]).map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.06)">
    <span style="font-size:13px">${c.category}</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:13px;color:#9090a8">${c.percentage}</span>
      <span class="tag" style="background:${c.assessment==='pozytywna'?'rgba(77,255,160,.1)':c.assessment==='negatywna'?'rgba(255,92,92,.12)':'rgba(232,255,71,.1)'};color:${c.assessment==='pozytywna'?'#4dffa0':c.assessment==='negatywna'?'#ff5c5c':'#e8ff47'}">${c.assessment}</span>
    </div></div>`).join('');
  h += sec('04','Strategia Contentowa',`<div class="body-text"><p>${cs.summary||''}</p>${cs.nicheDilution?`<p style="color:#ff5c5c">${cs.nicheDilution}</p>`:''}</div>${mix}${cs.formatAnalysis?`<div class="body-text" style="margin-top:.8rem"><p>${cs.formatAnalysis}</p></div>`:''}`);

  // 05 Engagement
  const eng = a.engagement||{};
  h += sec('05','Engagement i Metryki',`<div class="body-text"><p>${eng.summary||''}</p><p>${eng.benchmarkComparison||''}</p></div>
    ${(eng.problems||[]).map(p=>`<div class="diag"><div style="font-size:14px">⚠️</div><div class="diag-text">${p}</div></div>`).join('')}`);

  // 06 Brand
  const bc = a.brandConsistency||{};
  h += sec('06','Spójność Marki',`<div class="body-text"><p>${bc.positioningGap||''}</p><p>${bc.visualIdentity||''}</p><p>${bc.communicationTone||''}</p>${bc.recommendation?`<p style="color:#e8ff47;font-weight:500">${bc.recommendation}</p>`:''}</div>`);

  // 07 SWOT
  const sw = a.swot||{};
  h += sec('07','Analiza SWOT',`<div class="swot-grid">
    ${[['strengths','Mocne Strony','#4dffa0','rgba(77,255,160,.04)','rgba(77,255,160,.15)','↑'],['weaknesses','Słabe Strony','#ff5c5c','rgba(255,92,92,.04)','rgba(255,92,92,.15)','↓'],['opportunities','Szanse','#5cabff','rgba(92,171,255,.04)','rgba(92,171,255,.15)','+'],['threats','Zagrożenia','#ff9f3a','rgba(255,159,58,.04)','rgba(255,159,58,.15)','!']].map(([k,l,c,bg,b,p])=>`
    <div class="swot-card" style="background:${bg};border-color:${b}">
      <div class="swot-title" style="color:${c}">${l}</div>
      <ul class="swot-list">${(sw[k]||[]).map(i=>`<li><span style="color:${c};margin-right:4px">${p}</span>${i}</li>`).join('')}</ul>
    </div>`).join('')}
  </div>`);

  // 08 Priorities
  h += sec('08','Mapa Priorytetów',`${(a.priorities||[]).map((p,i)=>{
    const pc = p.priority==='KRYTYCZNY'?'#ff5c5c':p.priority==='WYSOKI'?'#ff9f3a':p.priority==='SREDNI'?'#5cabff':'#5a5a70';
    const pb = p.priority==='KRYTYCZNY'?'rgba(255,92,92,.12)':p.priority==='WYSOKI'?'rgba(255,159,58,.12)':p.priority==='SREDNI'?'rgba(92,171,255,.1)':'rgba(255,255,255,.04)';
    return `<div class="pri-item"><div class="pri-num" style="background:${pb};color:${pc};border:1px solid ${pc}44">${i+1}</div>
      <div><div class="pri-title">${p.title} <span class="tag" style="background:${pb};color:${pc}">${p.priority}</span></div>
      <div class="pri-desc">${p.description}</div>
      <div style="font-size:11px;color:#5a5a70;margin-top:4px">Wpływ: <span style="color:#9090a8">${p.impact}</span> · Wysiłek: <span style="color:#9090a8">${p.effort}</span></div></div></div>`;
  }).join('')}`);

  // 09 KPIs
  h += sec('09','KPI i Cele',`<div style="overflow-x:auto"><table>
    <thead><tr><th>Metryka</th><th>Teraz</th><th>Cel 3 mies.</th><th>Cel 6 mies.</th></tr></thead>
    <tbody>${(a.kpis||[]).map(k=>`<tr><td>${k.metric}</td><td>${k.current}</td><td class="good">${k.target3m}</td><td class="better">${k.target6m}</td></tr>`).join('')}</tbody>
  </table></div>`);

  // 10 Competitors
  if (a.competitors?.length) {
    h += sec('10','Benchmarking vs. Konkurencja',`<div style="overflow-x:auto"><table>
      <thead><tr><th>Konto</th><th>Followersów</th><th>Pozycjonowanie</th><th>Siła</th></tr></thead>
      <tbody>${a.competitors.map(c=>`<tr><td class="acc">${c.handle}</td><td>${c.followers}</td><td>${c.positioning}</td><td>${c.strength}</td></tr>`).join('')}</tbody>
    </table></div>`);
  }

  // 11 Conclusions
  const fc = a.finalConclusions||{};
  h += sec('11','Wnioski Finalne',`<div class="body-text"><p>${fc.mainMessage||''}</p></div>
    <div style="font-size:10px;color:#5a5a70;text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .6rem">Trzy kluczowe działania</div>
    ${(fc.topThreeActions||[]).map((a,i)=>`<div class="diag"><div style="font-weight:800;color:#e8ff47;font-size:12px;flex-shrink:0">${i+1}</div><div class="diag-text">${a}</div></div>`).join('')}
    <div class="pot-box"><div class="pot-label">Potencjał po wdrożeniu rekomendacji</div><div class="pot-val">${fc.potentialScore||8}<span style="font-size:14px;color:#5a5a70">/10</span></div></div>
  `);

  h += `<div class="footer">Raport wygenerowany przez <strong>ABX Viral</strong> · Adam Bartnik · @adambartnik_ · ${now}<br><span style="font-size:11px">Audyt oparty o publiczne dane. Dane mają charakter szacunkowy i doradczy.</span></div>`;

  document.getElementById('report').innerHTML = h;
}
</script>
</body>
</html>
